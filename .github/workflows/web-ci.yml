# CI Pipeline — Web
# Trigger: Pull requests targeting main that touch apps/web/
# Purpose: Install, test, SonarCloud analysis, build, verify code quality
# Equivalent to: pipelines/azure-devops/ci/web-ci.yml

name: 'Web - Continuous Integration'

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-app
        with:
          working-directory: apps/web

      - name: Run tests with coverage
        uses: ./.github/actions/run-tests
        with:
          working-directory: apps/web

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: apps/web
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Verify build
        run: npm run build
        working-directory: apps/web
