# Release Pipeline
# Trigger: Git tags matching v* (e.g., v1.0.0, v2.3.1-beta) or manual dispatch
# Purpose: Validate artifacts and deploy to cloud environments
# Equivalent to: pipelines/azure-devops/release/release.yml

name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Validate
  # ──────────────────────────────────────────────
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v8
        with:
          name: api-artifact
          path: artifacts/api
        # TODO: In a real setup, use workflow_run or a shared artifact store
        #       since cross-workflow artifact sharing requires additional config
        continue-on-error: true

      - name: Download Web artifact
        uses: actions/download-artifact@v8
        with:
          name: web-artifact
          path: artifacts/web
        continue-on-error: true

      - name: Run smoke tests (placeholder)
