# CD Pipeline — Web
# Trigger: Push to main that touches apps/web/
# Purpose: Build production bundle and upload as artifact
# Equivalent to: pipelines/azure-devops/cd/web-cd.yml

name: 'Web - Continuous Delivery'

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'

jobs:
  build:
    name: Build Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-app
        with:
          working-directory: apps/web

      - name: Build production bundle
        run: npm run build
        working-directory: apps/web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-artifact
          path: apps/web/dist
