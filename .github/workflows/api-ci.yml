# CI Pipeline — API
# Trigger: Push to main or pull requests targeting main that touch apps/api/
# Purpose: Install, test, SonarCloud analysis, verify code quality
# Equivalent to: pipelines/azure-devops/ci/api-ci.yml

name: 'API - Continuous Integration'

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-app
        with:
          working-directory: apps/api

      - name: Run tests with coverage
        uses: ./.github/actions/run-tests
        with:
          working-directory: apps/api

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: apps/api
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
