trigger:
  branches:
    include:
      - main
  paths:
    include:
      - .github/**
      - azure-pipelines.yml
      - README.md
      - azure-devops/**
      - deployments/**
      - docs/**
      - environments/**
      - jenkins/**
      - modules/**
      - platform/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - .github/**
      - azure-pipelines.yml
      - README.md
      - azure-devops/**
      - deployments/**
      - docs/**
      - environments/**
      - jenkins/**
      - modules/**
      - platform/**

stages:
  - stage: ValidateMonorepo
    displayName: Validate monorepo baseline
    jobs:
      - template: /azure-devops/templates/validate-monorepo.yml
        parameters:
          jobName: repository_guardrails
          displayName: Validate repository and pipeline entrypoints
          vmImage: ubuntu-latest
          requiredPaths:
            - .github
            - azure-devops
            - azure-devops/pipelines/environment-validation.yml
            - azure-devops/pipelines/multicloud-deployment-plan.yml
            - deployments
            - docs
            - environments
            - jenkins
            - modules
            - platform
            - README.md
