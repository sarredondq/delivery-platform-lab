trigger:
  branches:
    include:
      - main
  paths:
    include:
      - azure-devops/**
      - deployments/**
      - environments/**
      - modules/**
      - platform/**
      - README.md

pr:
  branches:
    include:
      - main
  paths:
    include:
      - azure-devops/**
      - deployments/**
      - environments/**
      - modules/**
      - platform/**
      - README.md

stages:
  - template: /azure-devops/templates/validate-environment-stage.yml
    parameters:
      stageName: ValidateDev
      displayName: Validate dev environment
      jobName: validate_dev_environment
      environmentName: dev
      requiredPaths:
        - environments/dev
        - environments/dev/.gitkeep
        - deployments/common
        - platform/scripts
        - modules/shared

  - template: /azure-devops/templates/validate-environment-stage.yml
    parameters:
      stageName: ValidateStaging
      displayName: Validate staging environment
      jobName: validate_staging_environment
      environmentName: staging
      requiredPaths:
        - environments/staging
        - environments/staging/.gitkeep
        - deployments/common
        - platform/scripts
        - modules/shared

  - template: /azure-devops/templates/validate-environment-stage.yml
    parameters:
      stageName: ValidateProd
      displayName: Validate prod environment
      jobName: validate_prod_environment
      environmentName: prod
      requiredPaths:
        - environments/prod
        - environments/prod/.gitkeep
        - deployments/common
        - platform/scripts
        - modules/shared
