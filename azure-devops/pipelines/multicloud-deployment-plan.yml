trigger:
  branches:
    include:
      - main
  paths:
    include:
      - azure-devops/**
      - deployments/**
      - environments/**
      - modules/**
      - platform/**
      - README.md

pr:
  branches:
    include:
      - main
  paths:
    include:
      - azure-devops/**
      - deployments/**
      - environments/**
      - modules/**
      - platform/**
      - README.md

stages:
  - stage: ValidateSharedFoundation
    displayName: Validate shared multi-cloud foundation
    jobs:
      - job: validate_shared_foundation
        displayName: Validate shared delivery contract
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - template: /azure-devops/templates/check-required-paths.yml
            parameters:
              requiredPaths:
                - deployments/common
                - environments/dev
                - environments/staging
                - environments/prod
                - modules/shared
                - platform/scripts

          - bash: |
              set -euo pipefail

              printf '%s\n' \
                'Shared foundation summary:' \
                'scope=multi-cloud-plan-starter' \
                'validated=common deployment foundation plus environment overlays' \
                'mode=preview-only'
            displayName: Print shared foundation summary

  - template: /azure-devops/templates/multicloud-plan-stage.yml
    parameters:
      stageName: PlanAws
      displayName: Preview AWS delivery plan
      jobName: preview_aws_plan
      cloudName: aws
      requiredPaths:
        - deployments/aws
        - deployments/common
        - environments/dev
        - environments/staging
        - environments/prod
        - modules/shared
        - platform/scripts

  - template: /azure-devops/templates/multicloud-plan-stage.yml
    parameters:
      stageName: PlanAzure
      displayName: Preview Azure delivery plan
      jobName: preview_azure_plan
      cloudName: azure
      requiredPaths:
        - deployments/azure
        - deployments/common
        - environments/dev
        - environments/staging
        - environments/prod
        - modules/shared
        - platform/scripts

  - template: /azure-devops/templates/multicloud-plan-stage.yml
    parameters:
      stageName: PlanGcp
      displayName: Preview GCP delivery plan
      jobName: preview_gcp_plan
      cloudName: gcp
      requiredPaths:
        - deployments/gcp
        - deployments/common
        - environments/dev
        - environments/staging
        - environments/prod
        - modules/shared
        - platform/scripts
