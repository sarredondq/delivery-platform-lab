parameters:
  - name: stageName
    type: string
  - name: displayName
    type: string
  - name: jobName
    type: string
  - name: cloudName
    type: string
  - name: vmImage
    type: string
    default: ubuntu-latest
  - name: requiredPaths
    type: object
    default: []

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    jobs:
      - job: ${{ parameters.jobName }}
        displayName: Plan ${{ parameters.cloudName }} delivery flow
        pool:
          vmImage: ${{ parameters.vmImage }}
        steps:
          - checkout: self

          - template: /azure-devops/templates/check-required-paths.yml
            parameters:
              requiredPaths: ${{ parameters.requiredPaths }}

          - bash: |
              set -euo pipefail

              printf '%s\n' \
                'Multi-cloud plan summary:' \
                'cloud=${{ parameters.cloudName }}' \
                'intent=validate-contracts-and-preview-rollout-order' \
                'flow=common-foundation -> ${{ parameters.cloudName }} target -> environments dev/staging/prod' \
                'credentials=not-required' \
                'deployment=disabled'
            displayName: Print ${{ parameters.cloudName }} plan summary
