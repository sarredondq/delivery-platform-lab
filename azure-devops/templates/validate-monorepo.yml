parameters:
  - name: jobName
    type: string
    default: validate_monorepo
  - name: displayName
    type: string
    default: Validate monorepo baseline
  - name: vmImage
    type: string
    default: ubuntu-latest
  - name: requiredPaths
    type: object
    default: []

jobs:
  - job: ${{ parameters.jobName }}
    displayName: ${{ parameters.displayName }}
    pool:
      vmImage: ${{ parameters.vmImage }}
    steps:
      - checkout: self

      - template: /azure-devops/templates/check-required-paths.yml
        parameters:
          requiredPaths: ${{ parameters.requiredPaths }}

      - bash: |
          set -euo pipefail

          printf '%s\n' \
            'Monorepo inventory:' \
            '.github -> GitHub Actions workflows' \
            'azure-devops -> Azure DevOps templates and pipeline support' \
            'deployments -> deployment automation entrypoints' \
            'environments -> environment-specific inputs' \
            'modules -> reusable delivery modules' \
            'platform -> shared platform tooling' \
            'README.md -> repository operating model overview'
        displayName: Print repository inventory
