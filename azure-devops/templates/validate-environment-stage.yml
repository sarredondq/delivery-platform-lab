parameters:
  - name: stageName
    type: string
  - name: displayName
    type: string
  - name: jobName
    type: string
  - name: environmentName
    type: string
  - name: vmImage
    type: string
    default: ubuntu-latest
  - name: requiredPaths
    type: object
    default: []

stages:
  - stage: ${{ parameters.stageName }}
    displayName: ${{ parameters.displayName }}
    jobs:
      - job: ${{ parameters.jobName }}
        displayName: Validate ${{ parameters.environmentName }} structure
        pool:
          vmImage: ${{ parameters.vmImage }}
        steps:
          - checkout: self

          - template: /azure-devops/templates/check-required-paths.yml
            parameters:
              requiredPaths: ${{ parameters.requiredPaths }}

          - bash: |
              set -euo pipefail

              printf '%s\n' \
                'Environment validation summary:' \
                'environment=${{ parameters.environmentName }}' \
                'contract=repository-and-folder-structure' \
                'checked=environments/${{ parameters.environmentName }}, deployments/common, platform/scripts, modules/shared' \
                'mode=validation-only'
            displayName: Print ${{ parameters.environmentName }} validation summary
