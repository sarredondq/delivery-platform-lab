# CI Pipeline — Web
# Trigger: Pull requests targeting main that touch apps/web/
# Purpose: Install, test, SonarCloud analysis, build, verify code quality

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - apps/web/**

jobs:
  - template: ../templates/jobs/ci-node-app.yml
    parameters:
      appName: web
      appPath: apps/web
      runBuild: true
      sonarProjectKey: ghactions-delivery-platform-web
      sonarProjectName: ghactions-delivery-platform-web
