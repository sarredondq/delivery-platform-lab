# CI Pipeline — API
# Trigger: Pull requests targeting main that touch apps/api/
# Purpose: Install, test, SonarCloud analysis, verify code quality

trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - apps/api/**

jobs:
  - template: ../templates/jobs/ci-node-app.yml
    parameters:
      appName: api
      appPath: apps/api
      runBuild: false
      sonarProjectKey: azdevops-delivery-platform-api
      sonarProjectName: azdevops-delivery-platform-api
      sonarTests: apps/api/tests
