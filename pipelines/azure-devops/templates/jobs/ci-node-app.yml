# Job template: CI pipeline for a Node.js application
# Usage: Installs deps, runs tests, optionally runs SonarCloud analysis, and optionally builds

parameters:
  - name: appName
    type: string
  - name: appPath
    type: string
  - name: nodeVersion
    type: string
    default: '20.x'
  - name: runBuild
    type: boolean
    default: false
  - name: sonarProjectKey
    type: string
    default: ''
  - name: sonarProjectName
    type: string
    default: ''

jobs:
  - job: CI_${{ parameters.appName }}
    displayName: 'CI — ${{ parameters.appName }}'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: self
        fetchDepth: 0

      - template: ../steps/install-node.yml
        parameters:
          nodeVersion: ${{ parameters.nodeVersion }}
          workingDirectory: ${{ parameters.appPath }}

      - template: ../steps/run-tests.yml
        parameters:
          workingDirectory: ${{ parameters.appPath }}

      - ${{ if ne(parameters.sonarProjectKey, '') }}:
          - template: ../steps/sonar-analysis.yml
            parameters:
              projectKey: ${{ parameters.sonarProjectKey }}
              projectName: ${{ parameters.sonarProjectName }}
              workingDirectory: ${{ parameters.appPath }}

      - ${{ if eq(parameters.runBuild, true) }}:
          - template: ../steps/build-app.yml
            parameters:
              workingDirectory: ${{ parameters.appPath }}
