# Step template: Run SonarCloud analysis
# Usage: Prepares, runs, and publishes SonarCloud analysis
# Requires: SonarCloud service connection named 'SonarCloud' in Azure DevOps

parameters:
  - name: projectKey
    type: string
  - name: projectName
    type: string
  - name: organization
    type: string
    default: 'sarredondq-key'
  - name: workingDirectory
    type: string

steps:
  - task: SonarCloudPrepare@3
    displayName: 'SonarCloud — Prepare analysis'
    inputs:
      SonarCloud: 'SonarCloud'
      organization: '${{ parameters.organization }}'
      scannerMode: 'CLI'
      configMode: 'manual'
      cliProjectKey: '${{ parameters.projectKey }}'
      cliProjectName: '${{ parameters.projectName }}'
      cliSources: '${{ parameters.workingDirectory }}/src'
      extraProperties: |
        sonar.tests=${{ parameters.workingDirectory }}/tests,${{ parameters.workingDirectory }}/src/__tests__
        sonar.javascript.lcov.reportPaths=${{ parameters.workingDirectory }}/coverage/lcov.info
        sonar.coverage.exclusions=**/tests/**,**/__tests__/**,**/test-setup.ts,**/main.tsx,**/vite-env.d.ts,**/vite.config.ts
        sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**

  - task: SonarCloudAnalyze@3
    displayName: 'SonarCloud — Run analysis'

  - task: SonarCloudPublish@3
    displayName: 'SonarCloud — Publish quality gate'
    inputs:
      pollingTimeoutSec: '300'
